<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ignite | NovaForge</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0f1c, #111827);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 120px;
    }

    h1 {
      font-size: 40px;
      color: #ff7a18;
    }

    p {
      font-size: 18px;
      color: #ccc;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 25px;
      background: #ff7a18;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #ff9a3c;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 Ignite by NovaForge</h1>
    <p>Spark your ideas, launch your projects.</p>

    <button class="btn">Build</button>
    <button class="btn">Test</button>
    <button class="btn">Deploy</button>
  </div>
</body>
  </html>
